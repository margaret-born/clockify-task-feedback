<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Category Feedback</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Change 3: Dark background and white text */
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #00003f; color: #ffffff; font-size: 15px; line-height: 1.6; }
  .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 100px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; color: #ffffff; }
  .subtitle { font-size: 13px; color: rgba(255, 255, 255, 0.7); margin-bottom: 28px; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
  .progress-fill { height: 4px; background: #ffffff; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-top: 6px; }

  .group-label { font-size: 11px; font-weight: 500; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; letter-spacing: 0.07em; margin: 24px 0 8px; }

  .category { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 12px; overflow: hidden; color: #1a1a1a; }

  .cat-row { display: grid; grid-template-columns: 28px 4px 1fr 350px; gap: 0; align-items: stretch; min-height: 56px; }

  .cat-num { display: flex; align-items: center; justify-content: center; font-size: 11px; color: #bbb; padding: 0 6px; }
  .cat-bar-inner { width: 4px; height: 100%; border-radius: 0; }

  .cat-name-col { display: flex; align-items: center; padding: 14px 16px; gap: 10px; }
  .cat-name { font-size: 14px; font-weight: 500; flex: 1; }
  .cat-stats { font-size: 12px; color: #888; white-space: nowrap; }

  .cat-controls { display: flex; flex-direction: column; gap: 8px; padding: 10px 16px; border-left: 1px solid #f0f0f0; background: #fafafa; }

  .toggle-wrap { display: flex; border: 1px solid #ddd; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
  .btn-toggle { flex: 1; padding: 7px 14px; font-size: 12px; font-weight: 500; border: none; background: #fff; cursor: pointer; color: #666; transition: all 0.15s; white-space: nowrap; }
  .btn-toggle:first-child { border-right: 1px solid #ddd; }
  .btn-toggle:hover { background: #f5f5f5; }
  .btn-toggle.active-good { background: #e8f5e9; color: #2e7d32; }
  .btn-toggle.active-needs { background: #fff3e0; color: #e65100; }

  .comment-inline textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 12px; font-family: inherit; resize: none; height: 36px; color: #1a1a1a; background: #fff; outline: none; transition: border-color 0.15s; line-height: 1.4; }
  .comment-inline textarea:focus { border-color: #1a1a2e; }

  /* Change 1: Examples toggle positioned below task options */
  .examples-toggle { border-top: 1px solid #f0f0f0; padding: 10px 16px; cursor: pointer; font-size: 12px; font-weight: 500; color: #3a5bc7; display: flex; align-items: center; gap: 6px; background: #fff; user-select: none; }
  .examples-toggle:hover { background: #f0f4ff; }

  .examples-panel { display: none; border-top: 1px solid #f0f0f0; padding: 16px 20px; background: #fafafa; }
  .examples-panel.open { display: block; }

  table.ex-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.ex-table th { text-align: left; font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; padding: 6px 10px; border-bottom: 1px solid #e0e0e0; background: #f5f5f3; }
  table.ex-table td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; color: #1a1a1a; }
  .prev-tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #f0f4ff; color: #3a5bc7; }
  .prev-tag.none { background: #f0f0f0; color: #bbb; }

  .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; color: #1a1a2e; padding: 12px 24px; display: flex; align-items: center; gap: 24px; font-size: 13px; z-index: 100; border-top: 1px solid #ddd; }
  .summary-bar span { color: #666; }
  .btn-submit-all { margin-left: auto; padding: 7px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
</style>
</head>

const state = {};
cats.forEach(c => { state[c.id] = { approval: null, comment: "", open: false }; });

function render() {
  const container = document.getElementById("categories");
  container.innerHTML = "";

  GROUPS.forEach(g => {
    const lbl = document.createElement("div");
    lbl.className = "group-label";
    lbl.textContent = g.label;
    container.appendChild(lbl);

    g.ids.forEach(id => {
      const cat = cats.find(c => c.id === id);
      const s = state[id];
      const pct = ((cat.count / TOTAL) * 100).toFixed(1);

      const wrap = document.createElement("div");
      wrap.className = "category";

      const needsComment = s.approval === "Needs Adjustment";

      wrap.innerHTML = `
        <div class="cat-row">
          <div class="cat-num">${id}</div>
          <div class="cat-bar-col"><div class="cat-bar-inner" style="background:${g.color}"></div></div>
          <div class="cat-name-col">
            <div class="cat-name">${cat.name}</div>
            <div class="cat-stats">${cat.count} entries · ${pct}%</div>
          </div>
          <div class="cat-controls">
            <div class="toggle-wrap">
              <button class="btn-toggle ${s.approval === 'Looks Good' ? 'active-good' : ''}"
                onclick="setApproval(${id}, 'Looks Good')">✓ Looks Good</button>
              <button class="btn-toggle ${s.approval === 'Needs Adjustment' ? 'active-needs' : ''}"
                onclick="setApproval(${id}, 'Needs Adjustment')">⚑ Needs Adjustment</button>
            </div>
            ${needsComment ? `
              <div class="comment-inline">
                <textarea placeholder="What would you change?" oninput="setComment(${id}, this.value)">${s.comment}</textarea>
              </div>` : ''}
          </div>
        </div>
        
        <div class="examples-toggle" onclick="toggleExamples(${id})">
           ${s.open ? "▲" : "▼"} Examples from 2025 Entries
        </div>

        <div class="examples-panel ${s.open ? 'open' : ''}">
          <table class="ex-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Project</th>
                <th>Current Task Categorization</th>
              </tr>
            </thead>
            <tbody>
              ${cat.examples.map(ex => `
                <tr>
                  <td class="col-date">${ex.date}</td>
                  <td>${ex.desc}</td>
                  <td class="col-project">${ex.project}</td>
                  <td><span class="prev-tag ${ex.prev ? '' : 'none'}">${ex.prev || 'none'}</span></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
      container.appendChild(wrap);
    });
  });

  updateProgress();
}

function setApproval(id, val) {
  state[id].approval = (state[id].approval === val) ? null : val;
  if (state[id].approval !== "Needs Adjustment") state[id].comment = "";
  render();
}

function setComment(id, val) { state[id].comment = val; }

function toggleExamples(id) {
  state[id].open = !state[id].open;
  render();
}

function updateProgress() {
  const reviewed = cats.filter(c => state[c.id].approval !== null).length;
  document.getElementById("progressFill").style.width = (reviewed / 19 * 100) + "%";
  document.getElementById("progressLabel").textContent = `${reviewed} of 19 categories reviewed`;
  document.getElementById("sumReviewed").textContent = reviewed;
  document.getElementById("sumGood").textContent = cats.filter(c => state[c.id].approval === "Looks Good").length;
  document.getElementById("sumNeeds").textContent = cats.filter(c => state[c.id].approval === "Needs Adjustment").length;
}

function submitAll() {
  alert("Reviews submitted for " + document.getElementById("sumReviewed").textContent + " categories.");
}

render();
</script>
