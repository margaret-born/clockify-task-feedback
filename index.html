  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #00003f; color: #ffffff; font-size: 15px; line-height: 1.6; }
  .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 100px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 12px; color: #ffffff; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
  .progress-fill { height: 4px; background: #ffffff; border-radius: 2px; transition: width 0.4s ease; }

  .cat-bar-inner { width: 4px; height: 100%; }

  .cat-name-col { display: flex; flex-direction: column; justify-content: center; padding: 16px; gap: 4px; }
  .cat-name { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .cat-definition { font-size: 13px; color: #555; line-height: 1.4; font-style: italic; }

  .cat-controls { display: flex; flex-direction: column; gap: 8px; padding: 16px; border-left: 1px solid #f0f0f0; background: #fcfcfc; justify-content: center; }

  }
